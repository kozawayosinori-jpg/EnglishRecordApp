<!DOCTYPE html>
<html lang="ja">
<body>
  <h2>録音テスト（APIキー方式）</h2>

  <button id="start">録音開始</button>
  <button id="stop" disabled>停止</button>

  <script>
    // ★ ここに先生が決めた秘密のキーを入れる（例： "abc123xyz"）
    const API_KEY = "abc123xyz";

    // ★ ここに GAS Web アプリの /exec URL を貼る
    const GAS_URL = "";

    let rec, chunks = [];

    document.getElementById("start").onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      rec = new MediaRecorder(stream);
      chunks = [];

      rec.ondataavailable = e => chunks.push(e.data);https://script.google.com/macros/s/AKfycbw06sERtlW3jtebxfkLYJOjRuQ3K7SFbeVS78JiCwPKLKMtKMXuPMBVQV9XbUSb1zz4/exec

      rec.onstop = () => {
        const blob = new Blob(chunks, { type: "audio/webm" });
        const reader = new FileReader();

        reader.onloadend = () => {
          const base64 = reader.result.split(",")[1];

          // ★ API キー付きで GAS に送信
          fetch(GAS_URL, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    audio: base64,
    key: API_KEY
  })
})
.then(r => r.json())
.then(t => alert("送信完了: " + t.status))
.catch(err => alert("送信エラー: " + err));

        };

        reader.readAsDataURL(blob);
      };

      rec.start();
      document.getElementById("start").disabled = true;
      document.getElementById("stop").disabled = false;
    };

    document.getElementById("stop").onclick = () => rec.stop();
  </script>
</body>
</html>
