<!DOCTYPE html>
<html>
<body>

<button onclick="sendTest()">送信</button>


<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxoDNqV-p2d0YXVO_udDgD1nFEgycJux4UcFCTIJlK7z1wdw9dI7fsYuKu5k06jphZM/exec";

function sendTest(){

  console.log("送信開始");

  fetch(GAS_URL,{
    method:"POST",
    mode:"no-cors",
    headers:{
      "Content-Type":"text/plain"
    },
    body:JSON.stringify({
      test:"hello"
    })
  })
  .then(() => {
    console.log("fetch完了");
    alert("送信しました");
  })
  .catch(err => {
    console.error("エラー", err);
  });

}

</script>     

</body>
</html>
